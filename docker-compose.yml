version: "3.8"

services:
  backend:
    build: .
    container_name: askpdf-backend
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - LLM_BACKEND=mistral_api
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - TOP_K_RESULTS=5
      - UPLOAD_DIR=data/uploads
      - VECTORSTORE_DIR=data/vectorstore
    volumes:
      - ./data:/app/data        # persist FAISS index across restarts
      - ./logs:/app/logs
    restart: always

  frontend:
    build: ./frontend
    container_name: askpdf-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always